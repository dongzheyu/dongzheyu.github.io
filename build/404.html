<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <script>
    // 获取当前路径
    var path = window.location.pathname;  // e.g. "/about" or "/projects"
    var search = window.location.search;  // e.g. "?foo=bar"
    var hash = window.location.hash;      // e.g. "#section"
    
    // 构建正确的 hash 路由 URL: /#/path
    var newUrl = '/#' + path + search + hash;
    
    // 跳转到正确的 URL
    window.location.replace(newUrl);
  </script>
</head>
<body>
  <p style="text-align: center; padding: 50px; font-family: sans-serif;">
    正在跳转...<br>
    如果页面没有自动跳转，<a href="/#/">点击这里</a>返回首页
  </p>
</body>
</html>
