<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase 连接测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        pre {
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🔧 Supabase 连接测试</h1>
    
    <div class="info status">
        <strong>说明：</strong>此页面用于测试 Supabase 连接是否正常
    </div>

    <div id="config-status"></div>
    <div id="connection-status"></div>

    <h2>操作</h2>
    <button onclick="testConnection()">测试连接</button>
    <button onclick="showConfig()">显示配置</button>

    <h2>日志</h2>
    <pre id="logs">等待测试...</pre>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

        const supabaseUrl = import.meta.env.VITE_SUPABASE_URL || 'NOT_SET'
        const supabaseKey = import.meta.env.VITE_SUPABASE_ANON_KEY || 'NOT_SET'

        let supabase = null

        function log(message) {
            const logs = document.getElementById('logs')
            logs.textContent += message + '\n'
        }

        function showStatus(elementId, type, message) {
            const element = document.getElementById(elementId)
            element.className = `${type} status`
            element.innerHTML = message
        }

        window.showConfig = function() {
            log('=== 配置信息 ===')
            log(`URL: ${supabaseUrl}`)
            log(`Key: ${supabaseKey ? '已设置 (' + supabaseKey.substring(0, 20) + '...)' : '未设置'}`)
            
            if (supabaseUrl === 'NOT_SET' || supabaseKey === 'NOT_SET') {
                showStatus('config-status', 'error', 
                    '<strong>❌ 配置错误：</strong>环境变量未正确设置，请检查 .env.local 文件')
            } else if (supabaseUrl.includes('your-project')) {
                showStatus('config-status', 'error',
                    '<strong>❌ 配置错误：</strong>URL 仍是占位符，请替换为实际的 Supabase URL')
            } else {
                showStatus('config-status', 'success',
                    '<strong>✅ 配置正常：</strong>环境变量已正确设置')
            }
        }

        window.testConnection = async function() {
            log('\n=== 开始测试 ===')
            log(`时间: ${new Date().toLocaleString()}`)

            // 检查配置
            if (supabaseUrl === 'NOT_SET' || supabaseKey === 'NOT_SET') {
                showStatus('connection-status', 'error',
                    '<strong>❌ 测试失败：</strong>请先配置环境变量')
                return
            }

            try {
                log('创建 Supabase 客户端...')
                supabase = createClient(supabaseUrl, supabaseKey)
                
                log('尝试连接到 Supabase...')
                const { data, error } = await supabase.from('profiles').select('*').limit(1)
                
                if (error) {
                    log(`❌ 错误: ${error.message}`)
                    log(`错误代码: ${error.code}`)
                    showStatus('connection-status', 'error',
                        `<strong>❌ 连接失败：</strong>${error.message}<br><small>错误代码: ${error.code}</small>`)
                } else {
                    log('✅ 连接成功!')
                    log(`返回数据: ${JSON.stringify(data)}`)
                    showStatus('connection-status', 'success',
                        '<strong>✅ 连接成功！</strong>Supabase 服务正常运行')
                }
            } catch (err) {
                log(`❌ 异常: ${err.message}`)
                showStatus('connection-status', 'error',
                    `<strong>❌ 连接失败：</strong>${err.message}`)
            }
        }

        // 页面加载时自动显示配置
        showConfig()
    </script>
</body>
</html>
