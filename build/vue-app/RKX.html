<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毕业感言 - 致任可馨</title>
    <link rel="stylesheet" href="graduation-style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>毕业感言</h1>
            <p class="subtitle">致 任可馨 同学</p>
        </header>
        <main>
            <div class="message">
                <p>我亲爱的好朋友：</p>
                <p>遇见你，是我这辈子最幸运的事之一。真的很感谢有你这个朋友，在我难过的时候，你总能耐心听我倾诉，有时都不需要说什么，你坐在我旁边就绝对开心了。</p>
                <p>在我开心的时候，你比我还开心，那种有人真心为你喝彩的感觉，真的非常好。你知道吗，和你在一起的时候，我不用端着，可以做真实的自己</p>
                <p>有些事我从没说过，但我一直记着时光荏苒，转眼间我们就要毕业了，但我们的友谊不会因为毕业而结束。</p>
                <p>好好吃饭，好好睡觉，我一直都在。愿你在未来的日子里，继续保持这份纯真和热情，勇敢追逐自己的梦想。</p>
                <p>祝你前程似锦，万事顺意！</p>
            </div>
            <div class="signature">
                <p>署名：董哲宇</p>
                <p>日期：2026年3月27日</p>
            </div>
        </main>
    </div>
</body>
</html>
