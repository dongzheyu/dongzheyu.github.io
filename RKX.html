    <title>毕业感言 - 致任可馨</title>
    <link rel="stylesheet" href="graduation-style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>毕业感言</h1>
            <p class="subtitle">致 任可馨 同学</p>
        </header>
        <main>
            <div class="message">
                <p>亲爱的朋友:</p><p>世界这么大，偏偏是你走进了我的生命里，真好。</p> <p>谢谢你，在我低落的时候愿意听我唠叨，有时候哪怕只是安静地坐着，你的存在就足够让我安心。我高兴的时候，你比谁都雀跃，那种被真心实意地祝福着的感觉，珍贵极了。和你在一块儿，我从不需要扮演谁，只用舒舒服服地做我自己。</p> <p>有些感动我没说出口，却一样一样都收在心底。日子一晃，我们就要各奔东西了，但这份情谊不会因为距离而褪色。</p> <p>记得按时吃饭，早点休息，我始终在这儿。往后的路，愿你继续带着这份明亮和赤诚，去奔赴你向往的远方。</p> <p>愿你一路顺遂，所想皆如愿！</p>
            </div>
            <div class="signature">
                <p>署名：董哲宇</p>
                <p>日期：2026年3月27日</p>
            </div>
        </main>
    </div>
</body>
</html>
