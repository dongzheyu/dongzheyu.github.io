name: SonarQube Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # 每周日凌晨 2 点运行
    - cron: '0 2 * * 0'

# Opt into Node.js 24 for JavaScript actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史以进行更好的分析

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: build/vue-app/package-lock.json

      - name: Install dependencies
        run: |
          cd build/vue-app
          npm ci

      - name: Build project
        run: |
          cd build/vue-app
          npm run build

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=dongzheyu.github.io
            -Dsonar.sources=build/vue-app/src
            -Dsonar.tests=build/vue-app/tests
            -Dsonar.javascript.lcov.reportPaths=build/vue-app/coverage/lcov.info
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/assets/**,**/*.config.js
            -Dsonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts

      - name: Upload coverage reports
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/vue-app/coverage/
          retention-days: 30
