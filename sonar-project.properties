# SonarQube 配置
sonar.projectKey=dongzheyu.github.io
sonar.projectName=JetCPP Website
sonar.projectVersion=1.0.0

# 源代码目录
sonar.sources=build/vue-app/src

# 测试目录（如果有的话）
# sonar.tests=build/vue-app/tests

# 语言
sonar.language=ts,vue,js

# 编码
sonar.sourceEncoding=UTF-8

# 排除的文件
sonar.exclusions=**/node_modules/**,**/dist/**,**/assets/**,**/*.config.js,**/*.d.ts

# 测试覆盖率报告路径（如果配置了测试）
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# TypeScript 配置
sonar.typescript.tsconfigPath=build/vue-app/tsconfig.json

# Vue 文件支持
sonar.vue.file.suffixes=.vue
