<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dongle</title>
  <script>
    // GitHub Pages SPA fallback for Vue Router History mode
    // 保存原始 URL
    sessionStorage.setItem('vue-router-path', window.location.pathname + window.location.search + window.location.hash);
    // 重定向到首页
    window.location.replace('/');
  </script>
</head>
<body>
  <p style="text-align: center; padding: 50px; font-family: sans-serif;">
    加载中...<br>
    如果页面没有自动跳转，<a href="/">点击这里</a>返回首页
  </p>
</body>
</html>
