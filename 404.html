<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <script>
    // 在 History 模式下，如果访问了不存在的路径，直接重定向到首页
    // 让 Vue Router 处理后续的 404 显示
    window.location.replace('/');
  </script>
</head>
<body>
  <p style="text-align: center; padding: 50px; font-family: sans-serif;">
    正在跳转...<br>
    如果页面没有自动跳转，<a href="/">点击这里</a>返回首页
  </p>
</body>
</html>
